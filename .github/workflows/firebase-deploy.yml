name: Firebase Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend-Abhängigkeiten installieren
        run: npm ci
        working-directory: frontend

      - name: Frontend bauen
        run: npm run build
        working-directory: frontend

      - name: Firestore und Storage Rules deployen (REST API)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PROJECT_ID: cnc-calc-9b89b
        run: |
          pip install --quiet google-auth requests
          python3 << 'PYEOF'
          import json, os, sys
          import requests
          from google.oauth2 import service_account
          from google.auth.transport.requests import Request

          sa_info = json.loads(os.environ['FIREBASE_SERVICE_ACCOUNT'])
          project = os.environ['PROJECT_ID']

          credentials = service_account.Credentials.from_service_account_info(
              sa_info,
              scopes=['https://www.googleapis.com/auth/cloud-platform']
          )
          credentials.refresh(Request())
          headers = {
              'Authorization': f'Bearer {credentials.token}',
              'Content-Type': 'application/json'
          }

          with open('firestore.rules') as f:
              firestore_rules = f.read()
          with open('storage.rules') as f:
              storage_rules = f.read()

          base = f'https://firebaserules.googleapis.com/v1/projects/{project}'

          def create_ruleset(content, filename):
              resp = requests.post(f'{base}/rulesets', headers=headers, json={
                  'source': {'files': [{'content': content, 'name': filename}]}
              })
              if not resp.ok:
                  print(f'Ruleset Fehler ({filename}): {resp.status_code} {resp.text}', file=sys.stderr)
                  sys.exit(1)
              return resp.json()['name']

          def set_release(release_name, ruleset_name):
              """PATCH wenn vorhanden, sonst POST anlegen."""
              full_name = f'projects/{project}/releases/{release_name}'
              body = {
                  'release': {'name': full_name, 'rulesetName': ruleset_name},
                  'updateMask': 'rulesetName'
              }
              resp = requests.patch(f'{base}/releases/{release_name}', headers=headers, json=body)
              if resp.status_code == 404:
                  resp = requests.post(f'{base}/releases', headers=headers, json={
                      'name': full_name,
                      'rulesetName': ruleset_name
                  })
              if not resp.ok:
                  print(f'Release Fehler ({release_name}): {resp.status_code} {resp.text}', file=sys.stderr)
                  sys.exit(1)

          # --- Firestore Rules ---
          fs_ruleset = create_ruleset(firestore_rules, 'firestore.rules')
          set_release('cloud.firestore', fs_ruleset)
          print(f'Firestore Rules deployed: {fs_ruleset}')

          # --- Storage Rules ---
          bucket = f'{project}.firebasestorage.app'
          st_ruleset = create_ruleset(storage_rules, 'storage.rules')
          set_release(f'firebase.storage/{bucket}', st_ruleset)
          print(f'Storage Rules deployed: {st_ruleset}')
          PYEOF

      - name: Google Auth einrichten
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: gcloud SDK einrichten
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: cnc-calc-9b89b

      - name: Cloud Functions Abhängigkeiten installieren
        run: npm ci
        working-directory: functions

      - name: Cloud Functions deployen
        run: |
          gcloud functions deploy testGemini \
            --gen2 \
            --runtime=nodejs20 \
            --region=europe-west1 \
            --source=functions \
            --entry-point=testGemini \
            --trigger-http \
            --no-allow-unauthenticated \
            --set-secrets="CNC_CALC=CNC-CALC:latest" \
            --memory=256Mi \
            --timeout=60s \
            --project=cnc-calc-9b89b

      - name: Firebase Hosting deployen
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: cnc-calc-9b89b
